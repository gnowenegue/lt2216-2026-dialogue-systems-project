<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>20-Question Game</title>
  </head>
  <body
    class="m-0 flex min-h-screen min-w-[320px] place-items-center bg-white text-slate-800 antialiased dark:bg-zinc-800 dark:text-white/90 font-sans"
  >
    <div
      id="cover"
      style="
        width: 100vw;
        height: 100vh;
        background-color: #27272a;
        position: absolute;
        top: 0;
        left: 0;
        z-index: 100;
      "
    ></div>
    <div id="app" class="p-8 mx-auto text-center max-w-7xl">
      <!-- Logo Section -->
      <div class="relative flex items-center justify-center mx-auto w-max">
        <svg width="0" height="0" class="absolute pointer-events-none">
          <filter id="svg-outline">
            <feMorphology
              in="SourceAlpha"
              result="expanded"
              operator="dilate"
              radius="5"
            />
            <feFlood flood-color="white" />
            <feComposite in2="expanded" operator="in" />
            <feMerge>
              <feMergeNode />
              <feMergeNode in="SourceGraphic" />
            </feMerge>
          </filter>
        </svg>
        <img
          src="/logo.svg"
          alt="Game Logo"
          class="relative transition-transform duration-500 ease-in-out w-96 h-96 hover:scale-105"
          style="
            filter: url(#svg-outline)
              drop-shadow(0px 4px 6px rgba(0, 0, 0, 0.3));
          "
        />
      </div>
      <div>
        <div class="p-8 pt-0">
          <div>
            <button
              id="game"
              type="button"
              disabled
              class="rounded-lg border border-transparent bg-slate-50 px-5 py-2.5 text-base font-medium transition-colors duration-300 ease-in-out enabled:cursor-pointer enabled:hover:border-indigo-500 enabled:hover:text-indigo-500 disabled:cursor-not-allowed disabled:opacity-50 dark:bg-zinc-900 dark:enabled:hover:border-indigo-500 dark:enabled:hover:text-indigo-500"
            >
              Loading Game...
            </button>
          </div>
          <div
            id="rules"
            class="hidden max-w-md p-6 m-6 mx-auto mt-8 text-sm text-left border shadow-sm rounded-xl border-slate-200 bg-slate-50 text-slate-700 dark:border-zinc-700 dark:bg-zinc-900/50 dark:text-slate-300"
          >
            <h2 class="mb-3 text-xl font-bold text-slate-900 dark:text-white">
              How to play:
            </h2>
            <ul class="pl-5 space-y-2 list-disc list-outside">
              <li>I will think of a secret word from a category you choose.</li>
              <li>
                You can ask up to 20 <strong>Yes or No</strong> questions to
                guess the word.
              </li>
              <li>
                You win if you guess the word correctly before running out of
                questions!
              </li>
            </ul>
          </div>
          <div>
            <button
              id="skip"
              type="button"
              class="hidden rounded-lg border border-transparent bg-slate-50 px-5 py-2.5 text-base font-medium transition-colors duration-300 ease-in-out enabled:cursor-pointer enabled:hover:border-indigo-500 enabled:hover:text-indigo-500 disabled:cursor-not-allowed disabled:opacity-50 dark:bg-zinc-900 dark:enabled:hover:border-indigo-500 dark:enabled:hover:text-indigo-500"
            >
              Skip Introduction
            </button>
          </div>
          <p
            id="instruction"
            class="hidden mt-4 font-semibold transition-opacity text-slate-700 dark:text-slate-300"
          >
            Instruction:
            <span
              class="text-indigo-500 transition-colors duration-300 ease-in-out value"
            ></span>
          </p>
          <p
            id="spst-meta"
            class="mt-4 font-semibold transition-opacity text-slate-700 dark:text-slate-300"
          >
            Mic Status:
            <span
              class="italic text-red-500 transition-colors duration-300 ease-in-out value"
              >Off</span
            >
          </p>
          <form
            id="text-fallback-form"
            class="flex hidden max-w-md gap-2 mx-auto mt-6"
          >
            <input
              id="text-input"
              disabled
              type="text"
              placeholder="Type your guess or question..."
              class="w-full px-4 py-2 text-sm border rounded-lg shadow-sm bg-slate-50 border-slate-200 focus:border-indigo-500 focus:outline-none focus:ring-2 focus:ring-indigo-500/20 dark:border-zinc-700 dark:bg-zinc-900/50 dark:text-white dark:placeholder-zinc-500 dark:focus:ring-indigo-500/40"
            />
            <button
              id="text-submit"
              disabled
              type="submit"
              class="px-5 py-2 text-sm font-medium text-white transition-colors duration-300 ease-in-out bg-indigo-500 rounded-lg shadow-sm hover:bg-indigo-600 focus:outline-none disabled:opacity-50 disabled:cursor-not-allowed"
            >
              Send
            </button>
          </form>
          <h3
            id="questions-remaining"
            class="hidden mt-4 text-lg font-semibold transition-opacity text-slate-700 dark:text-slate-300"
          >
            Questions Remaining:
            <span class="font-extrabold text-indigo-500 value"></span>
          </h3>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
